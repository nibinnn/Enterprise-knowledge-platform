[alembic]
script_location  = app/db/migrations
prepend_sys_path = .
file_template    = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone         = UTC

# Database URL — overridden by env.py which reads from app.config
sqlalchemy.url = postgresql+psycopg2://ekip_user:ekip_pass@localhost:5432/ekip

[post_write_hooks]
# Run black on new migration files
hooks           = black
black.type      = console_scripts
black.entrypoint = black
black.options   = REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level   = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level    = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level    = INFO
handlers =
qualname = alembic

[handler_console]
class     = StreamHandler
args      = (sys.stderr,)
level     = NOTSET
formatter = generic

[formatter_generic]
format    = %(levelname)-5.5s [%(name)s] %(message)s
datefmt   = %H:%M:%S
