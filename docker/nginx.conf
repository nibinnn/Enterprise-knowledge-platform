# docker/nginx.conf — EKIP production reverse proxy
# Place TLS certs in docker/certs/cert.pem and docker/certs/key.pem

upstream api      { server api:8000; }
upstream frontend { server frontend:8501; }

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 100M;   # allow large document uploads

    # Security headers
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection      "1; mode=block";

    # ── FastAPI ───────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /docs    { proxy_pass http://api; }
    location /redoc   { proxy_pass http://api; }
    location /health  { proxy_pass http://api; }
    location /metrics { proxy_pass http://api; allow 10.0.0.0/8; deny all; }

    # ── Streamlit ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";   # WebSocket for Streamlit
        proxy_read_timeout 86400s;
    }
}
